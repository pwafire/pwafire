<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PWAFire Test Console</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <canvas class="matrix-bg" id="matrix"></canvas>

  <div class="container">
    <div class="header">
      <h1>PWAFIRE</h1>
      <div class="status">
        <span>ONLINE</span>
        <span>LOCAL</span>
        <span>RUNS: <span id="test-count">0</span></span>
      </div>
    </div>

    <div class="panel">
      <div class="panel-title">Features</div>
      <div id="feature-list"></div>
    </div>

    <div class="panel">
      <div class="panel-title">Tests</div>
      <div class="test-grid" id="test-grid">
      </div>
    </div>

    <div class="panel">
      <div class="panel-title">Actions</div>

      <div class="actions-container">
        <button class="action-button primary" onclick="runAllTests()">
          Run All Tests
        </button>
        <button class="action-button secondary" onclick="clearConsole()">
          Clear Console
        </button>
        <button class="action-button danger" onclick="checkAllFeatures()">
          Scan Features
        </button>
      </div>

      <div class="stats-panel">
        <div class="stats-title">Statistics</div>
        <div>Exports <span>22/22</span></div>
        <div>Features <span id="feature-count">0/20</span></div>
        <div>Tests Run <span id="tests-run">0</span></div>
        <div>Success <span id="tests-success">0</span></div>
        <div>Failed <span id="tests-failed">0</span></div>
      </div>

      <div class="shortcuts-panel">
        <div class="shortcuts-title">Shortcuts</div>
        <div><code>Ctrl+R</code> Run All</div>
        <div><code>Ctrl+L</code> Clear</div>
        <div><code>Ctrl+S</code> Scan</div>
      </div>
    </div>

    <div class="console" id="console">
      <div class="console-line info">> System initialized</div>
      <div class="console-line info">> Loading test environment</div>
      <div class="console-line success">> Ready <span class="blink">_</span></div>
    </div>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
