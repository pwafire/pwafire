<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PWAFire Test Console</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <canvas class="matrix-bg" id="matrix"></canvas>

  <div class="container">
    <div class="header">
      <div class="header-left">
        <h1>PWAFIRE</h1>
        <div class="header-links">
          <a href="https://docs.pwafire.org" target="_blank" rel="noopener" class="header-link">
            📚 Docs
          </a>
          <a href="https://github.com/pwafire/pwafire" target="_blank" rel="noopener" class="header-link">
            <svg width="20" height="20" viewBox="0 0 16 16" fill="currentColor">
              <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/>
            </svg>
            GitHub
          </a>
        </div>
      </div>
      <div class="status">
        <span>ONLINE</span>
        <span>LOCAL</span>
        <span>RUNS: <span id="test-count">0</span></span>
      </div>
    </div>

    <div class="panel">
      <div class="panel-title">Features</div>
      <div id="feature-list"></div>
    </div>

    <div class="panel">
      <div class="panel-title">Tests</div>
      <div class="test-grid" id="test-grid">
      </div>
    </div>

    <div class="panel">
      <div class="panel-title">Actions</div>

      <div class="actions-container">
        <button class="action-button primary" onclick="runAllTests()">
          Run All Tests
        </button>
        <button class="action-button secondary" onclick="clearConsole()">
          Clear Console
        </button>
        <button class="action-button danger" onclick="checkAllFeatures()">
          Scan Features
        </button>
      </div>

      <div class="stats-panel">
        <div class="stats-title">Statistics</div>
        <div>Exports <span>22/22</span></div>
        <div>Features <span id="feature-count">0/20</span></div>
        <div>Tests Run <span id="tests-run">0</span></div>
        <div>Success <span id="tests-success">0</span></div>
        <div>Failed <span id="tests-failed">0</span></div>
      </div>

      <div class="shortcuts-panel">
        <div class="shortcuts-title">Shortcuts</div>
        <div><code>Ctrl+R</code> Run All</div>
        <div><code>Ctrl+L</code> Clear</div>
        <div><code>Ctrl+S</code> Scan</div>
      </div>
    </div>

    <div class="console" id="console">
      <div class="console-line info">> System initialized</div>
      <div class="console-line info">> Loading test environment</div>
      <div class="console-line success">> Ready <span class="blink">_</span></div>
    </div>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
