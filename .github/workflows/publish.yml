name: Publish Package

on:
  push:
    branches:
      - main
    paths:
      - 'packages/pwafire/package.json'

defaults:
  run:
    working-directory: packages/pwafire

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    # Only publish for feat() or fix() commits, not chore()
    if: startsWith(github.event.head_commit.message, 'feat(') || startsWith(github.event.head_commit.message, 'fix(')
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
          cache: "npm"
          cache-dependency-path: packages/pwafire/package-lock.json

      - name: Clean install dependencies
        run: |
          rm -rf node_modules package-lock.json
          npm install

      - run: npm run verify

      # Publish using OIDC trusted publisher (no token needed!)
      - run: npm publish --provenance --access public

      - name: Get version from package.json
        id: version
        run: echo "VERSION=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.VERSION }}
          generate_release_notes: true
